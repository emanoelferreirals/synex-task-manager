
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app { font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; height: 600px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); flex-shrink: 0; }
  .tab { flex: 1; padding: 12px; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); background: none; border: none; cursor: pointer; transition: all 0.15s; }
  .tab.active { color: var(--color-text-primary); background: var(--color-background-primary); border-bottom: 2px solid var(--color-text-primary); }
  .tab:hover:not(.active) { color: var(--color-text-primary); background: var(--color-background-primary); }
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 4px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .avatar.bot { background: var(--color-background-tertiary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
  .avatar.user-av { background: var(--color-text-primary); color: var(--color-background-primary); }
  .bubble { max-width: 80%; padding: 9px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; color: var(--color-text-primary); }
  .msg.bot .bubble { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--color-text-primary); color: var(--color-background-primary); border-top-right-radius: 4px; }
  .task-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-left: 2px solid var(--color-text-primary); border-radius: 8px; padding: 8px 12px; margin-top: 6px; font-size: 12.5px; }
  .task-card .tc-title { font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
  .task-card .tc-desc { color: var(--color-text-secondary); margin-bottom: 4px; }
  .task-card .tc-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--color-text-tertiary); }
  .hint { font-size: 11px; color: var(--color-text-tertiary); text-align: center; padding: 4px 0 8px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .input-area { border-top: 0.5px solid var(--color-border-tertiary); padding: 12px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  .input-wrap { flex: 1; }
  textarea { width: 100%; resize: none; border: 0.5px solid var(--color-border-secondary); border-radius: 12px; padding: 9px 13px; font-size: 13.5px; font-family: 'DM Sans', sans-serif; background: var(--color-background-secondary); color: var(--color-text-primary); line-height: 1.5; min-height: 40px; max-height: 120px; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--color-border-primary); }
  textarea::placeholder { color: var(--color-text-tertiary); }
  .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--color-text-primary); color: var(--color-background-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
  .send-btn:hover { opacity: 0.8; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn svg { width: 15px; height: 15px; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .footer-link { text-align: center; padding: 6px 0 8px; flex-shrink: 0; }
  .footer-link a { font-size: 10.5px; color: var(--color-text-tertiary); text-decoration: none; font-family: 'DM Mono', monospace; transition: color 0.15s; }
  .footer-link a:hover { color: var(--color-text-secondary); }
  .list-view { flex: 1; overflow-y: auto; padding: 16px; }
  .list-view::-webkit-scrollbar { width: 4px; }
  .list-view::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 4px; }
  .list-empty { text-align: center; color: var(--color-text-tertiary); font-size: 13px; margin-top: 60px; line-height: 2; }
  .list-item { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 0.5px solid var(--color-border-tertiary); animation: fadeUp 0.2s ease; }
  .list-item:last-child { border-bottom: none; }
  .li-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--color-text-primary); }
  .li-dot.overdue { background: #E24B4A; }
  .li-dot.soon { background: #EF9F27; }
  .li-body { flex: 1; }
  .li-title { font-size: 13.5px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
  .li-desc { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .li-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--color-text-tertiary); }
  .li-del { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: color 0.15s, background 0.15s; flex-shrink: 0; }
  .li-del:hover { color: #E24B4A; background: #FCEBEB; }
  .section-label { font-size: 10.5px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 0 8px; font-family: 'DM Mono', monospace; }
  .loading-row { display: flex; align-items: center; gap: 8px; color: var(--color-text-tertiary); font-size: 12px; padding: 20px 0; justify-content: center; }
  .spinner { width: 14px; height: 14px; border: 1.5px solid var(--color-border-tertiary); border-top-color: var(--color-text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cfg-banner { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-left: 2px solid #EF9F27; border-radius: 8px; padding: 10px 13px; font-size: 12.5px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .cfg-banner code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--color-text-primary); background: var(--color-background-tertiary); padding: 1px 5px; border-radius: 4px; }
</style>

<h2 class="sr-only">Gerenciador de tarefas com chat e integração Supabase</h2>

<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat', this)">chat</button>
    <button class="tab" onclick="switchTab('list', this)">tarefas</button>
  </div>

  <div class="view active" id="view-chat">
    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="avatar bot">T</div>
        <div class="bubble" id="welcome-bubble">
          <div class="cfg-banner">
            Configure as variáveis no topo do script:<br>
            <code>SUPABASE_URL</code> e <code>SUPABASE_KEY</code>
          </div>
          Olá! Digite uma tarefa no formato:<br>
          <strong>título; descrição; dd/mm/aaaa hh:mm</strong>
        </div>
      </div>
    </div>
    <div class="hint">título; descrição; data prazo</div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="chat-input" rows="1" placeholder="Reunião com cliente; Discutir proposta; 20/04/2025 14:00" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="footer-link">
      <a href="https://chatgpt.com/c/69e21a90-9214-832a-a2ba-6bd4086f370c" target="_blank">abrir chatgpt ↗</a>
    </div>
  </div>

  <div class="view" id="view-list">
    <div class="list-view" id="task-list">
      <div class="list-empty">carregando tarefas...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ─── CONFIGURE AQUI ──────────────────────────────────────────
  const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
  const SUPABASE_KEY = 'SUA_ANON_KEY';
  // ─────────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;

  async function init() {
    const { data } = await db.auth.getUser();
    currentUser = data?.user ?? null;
  }

  init();

  // ── PARSE ────────────────────────────────────────────────────
  function parseInput(text) {
    const parts = text.split(';').map(s => s.trim());
    const titulo    = parts[0] || '';
    const descricao = parts[1] || '';
    const prazoRaw  = parts[2] || '';
    let prazo = null;

    if (prazoRaw) {
      const m = prazoRaw.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);
      if (m) prazo = new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]);
    }
    return { titulo, descricao, prazo, prazoRaw };
  }

  function formatDate(d) {
    if (!d) return '—';
    const dt = typeof d === 'string' ? new Date(d) : d;
    return dt.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  // ── INSERT ───────────────────────────────────────────────────
  async function insertTarefa({ titulo, descricao, prazo }) {
    const payload = { titulo, descricao };
    if (prazo) payload.prazo = prazo.toISOString();
    if (currentUser) payload.user_id = currentUser.id;

    const { data, error } = await db
      .from('tarefas')
      .insert([payload])
      .select()
      .single();

    return { data, error };
  }

  // ── SELECT ───────────────────────────────────────────────────
  async function fetchTarefas() {
    let query = db
      .from('tarefas')
      .select('id, titulo, descricao, prazo, created_at')
      .order('prazo', { ascending: true, nullsFirst: false });

    if (currentUser) query = query.eq('user_id', currentUser.id);

    const { data, error } = await query;
    return { data, error };
  }

  // ── DELETE ───────────────────────────────────────────────────
  async function deleteTarefa(id) {
    const { error } = await db.from('tarefas').delete().eq('id', id);
    return { error };
  }

  // ── CHAT UI ──────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function addBotMsg(html) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `<div class="avatar bot">T</div><div class="bubble">${html}</div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addUserMsg(text) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `<div class="avatar user-av">U</div><div class="bubble">${text.replace(/</g,'&lt;')}</div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMessage() {
    const inp = document.getElementById('chat-input');
    const btn = document.getElementById('send-btn');
    const text = inp.value.trim();
    if (!text) return;

    addUserMsg(text);
    inp.value = '';
    inp.style.height = 'auto';
    btn.disabled = true;

    const { titulo, descricao, prazo, prazoRaw } = parseInput(text);

    if (!titulo) {
      addBotMsg('Não entendi. Use o formato: <strong>título; descrição; dd/mm/aaaa hh:mm</strong>');
      btn.disabled = false;
      return;
    }

    if (prazoRaw && !prazo) {
      addBotMsg('Data inválida. Use o formato: <strong>dd/mm/aaaa hh:mm</strong>');
      btn.disabled = false;
      return;
    }

    addBotMsg('<div class="spinner" style="display:inline-block"></div> salvando...');

    const { data, error } = await insertTarefa({ titulo, descricao, prazo });

    const msgs = document.getElementById('messages');
    msgs.removeChild(msgs.lastChild);

    if (error) {
      addBotMsg(`Erro ao salvar: <strong>${error.message}</strong>`);
    } else {
      addBotMsg(`
        Tarefa salva!
        <div class="task-card">
          <div class="tc-title">${titulo}</div>
          ${descricao ? `<div class="tc-desc">${descricao}</div>` : ''}
          <div class="tc-date">prazo: ${formatDate(prazo)}</div>
        </div>`);
    }

    btn.disabled = false;
  }

  // ── LIST UI ──────────────────────────────────────────────────
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('view-' + tab).classList.add('active');
    if (tab === 'list') loadList();
  }

  async function loadList() {
    const container = document.getElementById('task-list');
    container.innerHTML = '<div class="loading-row"><div class="spinner"></div> carregando...</div>';

    const { data, error } = await fetchTarefas();

    if (error) {
      container.innerHTML = `<div class="list-empty">Erro: ${error.message}</div>`;
      return;
    }

    renderList(data || []);
  }

  function renderList(tasks) {
    const container = document.getElementById('task-list');

    if (!tasks.length) {
      container.innerHTML = '<div class="list-empty">nenhuma tarefa ainda.<br>use o chat para adicionar.</div>';
      return;
    }

    const now = new Date();
    let html = '<div class="section-label">por prazo</div>';

    tasks.forEach(t => {
      let dotClass = '';
      if (t.prazo) {
        const diff = new Date(t.prazo) - now;
        if (diff < 0) dotClass = 'overdue';
        else if (diff < 86400000) dotClass = 'soon';
      }
      html += `
        <div class="list-item" id="item-${t.id}">
          <div class="li-dot ${dotClass}"></div>
          <div class="li-body">
            <div class="li-title">${t.titulo}</div>
            ${t.descricao ? `<div class="li-desc">${t.descricao}</div>` : ''}
            <div class="li-date">${formatDate(t.prazo)}</div>
          </div>
          <button class="li-del" onclick="removeTask('${t.id}')" title="remover">✕</button>
        </div>`;
    });

    container.innerHTML = html;
  }

  async function removeTask(id) {
    const el = document.getElementById('item-' + id);
    if (el) el.style.opacity = '0.4';

    const { error } = await deleteTarefa(id);

    if (error) {
      if (el) el.style.opacity = '1';
      alert('Erro ao remover: ' + error.message);
    } else {
      if (el) el.remove();
    }
  }
</script>
