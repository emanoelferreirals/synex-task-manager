<!DOCTYPE html>
<!-- DOCTYPE diz ao navegador: "este arquivo usa HTML5 moderno" -->

<html lang="pt-BR">
<!-- <html> é o elemento raiz que envolve TUDO na página.
     lang="pt-BR" informa ao navegador e leitores de tela que o idioma é português do Brasil -->

<head>
<!-- <head> contém configurações e metadados da página — o usuário NÃO vê este conteúdo diretamente,
     mas ele afeta comportamento, aparência e SEO -->

    <meta charset="UTF-8">
    <!-- Define o conjunto de caracteres como UTF-8, que suporta acentos (ã, é, ç...).
         Sem isso, letras acentuadas virariam símbolos estranhos como "Ã£" -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configura o comportamento em dispositivos móveis:
         width=device-width → a largura da página se adapta à tela do aparelho
         initial-scale=1.0 → começa sem zoom aplicado
         Sem isso, o celular exibiria a página como se fosse um desktop encolhido -->

    <title>Tarefas</title>
    <!-- Texto que aparece na aba do navegador e nos favoritos -->

    <link rel="stylesheet" href="styles/tarefas.css">
</head>
<body>

<div class="shell">
<!-- Container principal que centraliza e organiza toda a interface.
     É aqui que as abas, views e rodapé são organizados verticalmente. -->


    <!-- ══════════════════════════════════════════════════════
         ABAS DE NAVEGAÇÃO
         Três botões: Lista, Calendário e Arquivadas.
         Apenas uma aba pode estar ativa por vez.
         onclick chama switchTab() com o nome da view correspondente.
         ══════════════════════════════════════════════════════ -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('list')">Lista</button>
        <!-- "active" na primeira aba: esta é a tela inicial ao carregar a página -->

        <button class="tab"        onclick="switchTab('cal')">Calendário</button>
        <!-- Sem "active" → começa inativa -->

        <button class="tab"        onclick="switchTab('archived')">Arquivadas</button>
        <!-- Terceira aba: mostra tarefas com status "concluida" -->
    </div>


    <!-- ══════════════════════════════════════════════════════
         VIEW: LISTA DE TAREFAS ATIVAS
         Começa visível (tem "active"). Mostra tarefas com
         status diferente de "concluida", ordenadas por importância.
         ══════════════════════════════════════════════════════ -->
    <div class="view active" id="view-list">
        <div id="task-list" class="task-list">
            <!-- O JS preenche este container com cartões de tarefa.
                 Antes dos dados chegarem, mostra a mensagem abaixo. -->
            <div class="loading-row">carregando tarefas...</div>
        </div>
    </div>


    <!-- ══════════════════════════════════════════════════════
         VIEW: CALENDÁRIO + PAINEL DO DIA
         Começa oculto (sem "active"). Aparece ao clicar em "Calendário".
         ══════════════════════════════════════════════════════ -->
    <div class="view" id="view-cal">

        <!-- Navegação de mês: seta ‹ | Nome do mês e ano | seta › -->
        <div class="cal-nav">
            <button onclick="calPrev()">&#8249;</button>
            <!-- &#8249; = caractere "‹" (seta menor-que) para voltar ao mês anterior -->

            <span id="cal-month-label"></span>
            <!-- O JS escreve aqui: "Abril 2025", "Maio 2025", etc. -->

            <button onclick="calNext()">&#8250;</button>
            <!-- &#8250; = caractere "›" (seta maior-que) para avançar ao próximo mês -->
        </div>

        <!-- Cabeçalho com os 7 dias da semana -->
        <div class="cal-header">
            <div class="cal-day-label">Dom</div>
            <div class="cal-day-label">Seg</div>
            <div class="cal-day-label">Ter</div>
            <div class="cal-day-label">Qua</div>
            <div class="cal-day-label">Qui</div>
            <div class="cal-day-label">Sex</div>
            <div class="cal-day-label">Sáb</div>
        </div>

        <!-- Grade dos dias do mês — células geradas dinamicamente pelo JS.
             O JS insere aqui: células vazias (alinhamento) + células de cada dia. -->
        <div class="cal-grid" id="cal-grid"></div>


        <!-- ════════════════════════════════════════════════════
             PAINEL DO DIA
             Aparece ABAIXO da grade ao clicar em um dia.
             Começa fechado (max-height: 0, opacity: 0).
             Ao clicar num dia, o JS adiciona classe "open".
             ════════════════════════════════════════════════════ -->
        <div class="day-panel" id="day-panel">

            <!-- Cabeçalho: exibe a data selecionada e o botão de adicionar -->
            <div class="day-panel-header">
                <span class="day-panel-title" id="day-panel-title">—</span>
                <!-- O JS substitui "—" pela data formatada: "Terça-feira, 22 de abril de 2025" -->

                <button class="add-task-btn" onclick="toggleAddForm()">
                    <span>+</span> Adicionar tarefa
                    <!-- Clique abre/fecha o formulário .add-form abaixo -->
                </button>
            </div>

            <!-- Lista de tarefas do dia selecionado — preenchida pelo JS -->
            <div class="day-task-list" id="day-task-list">
                <!-- renderDayPanel() insere aqui os cartões das tarefas do dia.
                     Se não houver tarefas, mostra "Nenhuma tarefa para este dia." -->
            </div>

            <!-- Formulário de nova tarefa (oculto até clicar "Adicionar tarefa") -->
            <div class="add-form" id="add-form">

                <div class="add-form-title">
                    Nova tarefa para <span id="add-form-date-label"></span>
                    <!-- Ex: "Nova tarefa para 22/04/2025"
                         O span é preenchido pelo JS com a data selecionada. -->
                </div>

                <input class="add-input" id="add-titulo"    type="text" placeholder="Título da tarefa" />
                <!-- Campo obrigatório — validado antes de salvar (não pode estar vazio) -->

                <input class="add-input" id="add-descricao" type="text" placeholder="Descrição (opcional)" />
                <!-- Campo opcional — pode ficar vazio -->

                <div class="add-form-row">
                    <select class="add-select" id="add-prioridade">
                        <!-- "media" começa selecionado como padrão sensato -->
                        <option value="baixa">Prioridade baixa</option>
                        <option value="media" selected>Prioridade média</option>
                        <option value="alta">Prioridade alta</option>
                    </select>

                    <button class="add-submit" id="add-submit-btn" onclick="salvarTarefaDia()">Salvar</button>
                    <!-- Botão é desabilitado durante o salvamento para evitar duplicatas -->
                </div>

                <div class="add-cancel-row">
                    <span class="add-cancel-link" onclick="toggleAddForm()">cancelar</span>
                    <!-- Clique chama toggleAddForm() novamente, o que fecha o formulário -->
                </div>

            </div>
            <!-- fim do .add-form -->

        </div>
        <!-- fim do .day-panel -->

    </div>
    <!-- fim do #view-cal -->


    <!-- ══════════════════════════════════════════════════════
         VIEW: TAREFAS ARQUIVADAS (concluídas)
         Começa oculta. O JS preenche quando o usuário clica
         na aba "Arquivadas".
         ══════════════════════════════════════════════════════ -->
    <div class="view" id="view-archived">
        <div id="archived-list" class="task-list">
            <div class="loading-row">carregando...</div>
            <!-- Placeholder inicial — substituído por renderArchived() -->
        </div>
    </div>


    <!-- ══════════════════════════════════════════════════════
         BARRA DE COMANDO (rodapé fixo)
         Campo de texto para criar tarefas rapidamente com formato:
         "Título; Descrição; Prioridade; Prazo (DD/MM/AAAA)"
         ══════════════════════════════════════════════════════ -->
    <div class="chat-bar">
        <div class="chat-input-row">

            <textarea id="command"
                placeholder="Título; Descrição; Prioridade; Prazo (DD/MM/AAAA)"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();salvarTarefa(event)}"
                oninput="autoResize(this)">
            </textarea>
            <!-- onkeydown: captura pressionamento de tecla.
                     Se for Enter (sem Shift): previne quebra de linha e salva a tarefa.
                     Shift+Enter: comportamento padrão — adiciona uma nova linha.

                     oninput: toda vez que o usuário digita algo, chama autoResize()
                     para ajustar a altura do campo ao conteúdo. -->

            <button class="send-btn" onclick="salvarTarefa(event)" title="Enviar">
                <!-- title="Enviar": tooltip exibido ao passar o mouse sobre o botão -->

                <!-- Ícone SVG de avião de papel desenhado com código:
                     - viewBox="0 0 24 24": área de desenho de 24x24 unidades
                     - <line>: a linha diagonal da asa/cauda do avião
                     - <polygon>: os pontos que formam o corpo triangular do avião -->
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>

        </div>

        <!-- Link externo discreto no rodapé — abre o ChatGPT em nova aba -->
        <!-- 
             INSTRUÇÕES PARA USAR ASSISTENTE DE TAREFAS:
             
             Este link abre um ChatGPT configurado como assistente de organização de tarefas.
             O assistente converte descrições naturais de tarefas para o formato:
             Título; Descrição; Prioridade; Prazo (DD/MM/AAAA)
             
             Link recomendado (já configurado):
             https://chatgpt.com/share/69e43032-2e70-83e9-81a7-19a77bf23edf
             
             OU criar seu próprio link com o seguinte prompt:
             
             "Você é um assistente de organização de tarefas. Sempre que eu te descrever uma ou mais tarefas — em qualquer formato, linguagem informal, lista, parágrafo, ou como for — você deve me retornar APENAS o input formatado para o meu sistema, sem explicações, sem texto extra, sem introdução.
             
             O formato é:
             Título; Descrição; Prioridade; Prazo (DD/MM/AAAA)
             
             Regras:
             - Título: curto e direto
             - Descrição: uma frase explicando o que precisa ser feito (pode ser vazia se não houver contexto)
             - Prioridade: apenas "alta", "media" ou "baixa" — deduza pela urgência e importância se eu não informar
             - Prazo: no formato DD/MM/AAAA — se eu não informar, omita esse campo
             - Várias tarefas: separe com " | " (espaço, pipe, espaço)
             - Nunca adicione texto antes ou depois do input formatado
             - Se eu falar algo que não é tarefa, pergunte o que devo formatar"
             
             Depois de configurar, compartilhe o chat e use o link aqui.
        -->
        <div class="chatgpt-link">
            <a href="https://chatgpt.com/c/69e43022-38f8-83e9-9b5c-161535efb46e" target="_blank">
                abrir chatgpt ↗
                <!-- target="_blank": abre em nova aba para não sair da aplicação
                     ↗: símbolo visual de "link externo"
                     Assitente: Organizador de Tarefas (converte textos em formato padronizado) -->
            </a>
        </div>
    </div>

</div>
<!-- fim da .shell -->


<!-- ══════════════════════════════════════════════════════════════
     BIBLIOTECAS EXTERNAS
     ══════════════════════════════════════════════════════════════ -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Carrega a biblioteca JavaScript do Supabase de um CDN (servidor externo).
     Isso adiciona o objeto global "supabase" ao contexto da página.
     Supabase é o banco de dados na nuvem que armazena as tarefas.
     CDN = Content Delivery Network: servidor distribuído globalmente para carregamento rápido. -->

<script src="scripts/supabase_connection.js"></script>
<!-- Arquivo local com as credenciais de conexão ao Supabase (URL + chave pública).
     Mantido em arquivo separado por organização — evita deixar as chaves misturadas
     ao código da interface.
     Após executar, disponibiliza a variável global "supabaseClient" usada abaixo. -->


<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT — TODA A LÓGICA DA APLICAÇÃO
     ══════════════════════════════════════════════════════════════ -->
<script src="scripts/tarefas.js"></script>

</body>
</html>
