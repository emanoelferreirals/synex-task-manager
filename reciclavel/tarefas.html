<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
</head>
<body>
    <a href="https://chatgpt.com/c/69e21a90-9214-832a-a2ba-6bd4086f370c" target="_blank">
        Abrir ChatGPT
    </a>

    <!--
        Formato do input:
        titulo; descricao; prioridade (alta/media/baixa); prazo (DD/MM/AAAA)
        Exemplo: Estudar JS; cap 3 e 4; alta; 20/04/2025
    -->
    <form onsubmit="salvarTarefa(event)">
        <textarea id="command" placeholder="Título; Descrição; Prioridade; Prazo (DD/MM/AAAA)" required></textarea>
        <button type="submit">Salvar</button>
    </form>

    <div class="view" id="view-list">
        <div class="list-view" id="task-list">
            <div class="list-empty">carregando tarefas...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase_connection.js"></script>
    <script>

        // ── SUPABASE: CRUD ───────────────────────────────────────────────

        async function fetchTarefas() {
            return await supabaseClient
                .from('tarefas')
                .select('*')
                .order('created_at', { ascending: false });
        }

        async function deleteTarefa(id) {
            return await supabaseClient
                .from('tarefas')
                .delete()
                .eq('id', id);
        }

        // ── ALGORITMO DE IMPORTÂNCIA ─────────────────────────────────────
        //
        // score = prioridade + urgencia + tempo_parado
        //
        // prioridade:   alta=3  media=2  baixa=1
        // urgencia:     1-2 dias=+3  3-5 dias=+2  mais=+1  sem prazo=0
        // tempo_parado: +1 a cada 3 dias sem atualizar
        //
        // resultado:
        //   score >= 6 → ALTA
        //   score >= 4 → MÉDIA
        //   senão      → BAIXA

        function calcularScore(tarefa) {
            const now = new Date();

            // prioridade
            const mapPrioridade = { alta: 3, media: 2, baixa: 1 };
            const scorePrioridade = mapPrioridade[tarefa.prioridade] || 1;

            // urgencia (prazo)
            let scoreUrgencia = 0;
            if (tarefa.prazo) {
                const diffDias = (new Date(tarefa.prazo) - now) / 86400000;
                if (diffDias <= 2)      scoreUrgencia = 3;
                else if (diffDias <= 5) scoreUrgencia = 2;
                else                    scoreUrgencia = 1;
            }

            // tempo parado (usa updated_at ou created_at)
            const ultimaAtualizacao = new Date(tarefa.updated_at || tarefa.created_at);
            const diasParado = (now - ultimaAtualizacao) / 86400000;
            const scoreTempoParado = Math.floor(diasParado / 3);

            return scorePrioridade + scoreUrgencia + scoreTempoParado;
        }

        function scoreParaLabel(score) {
            if (score >= 6) return 'alta';
            if (score >= 4) return 'media';
            return 'baixa';
        }

        // ── SALVAR TAREFA ────────────────────────────────────────────────

        async function salvarTarefa(event) {
            event.preventDefault();

            const command = document.getElementById("command").value;
            const parts = command.split(";").map(s => s.trim());

            const titulo     = parts[0] || "";
            const descricao  = parts[1] || "";
            const prioridade = (parts[2] || "media").toLowerCase();

            // converte prazo DD/MM/AAAA → formato ISO para o banco
            let prazo = null;
            if (parts[3]) {
                const [dia, mes, ano] = parts[3].split("/");
                prazo = `${ano}-${mes}-${dia}`;
            }

            const { data } = await supabaseClient.auth.getUser();
            const user = data.user;

            if (!user) {
                alert("Você precisa estar logado!");
                return;
            }

            const { error } = await supabaseClient
                .from('tarefas')
                .insert([{
                    titulo,
                    descricao,
                    prioridade,
                    prazo,
                    status: 'pendente',
                    user_id: user.id
                }]);

            if (error) {
                alert("Erro: " + error.message);
            } else {
                document.getElementById("command").value = "";
                loadList();
            }
        }

        // ── UTILITÁRIOS ──────────────────────────────────────────────────

        function formatDate(date) {
            if (!date) return '';
            return new Date(date).toLocaleDateString();
        }

        // ── RENDERIZAÇÃO DA LISTA ────────────────────────────────────────

        async function loadList() {
            const container = document.getElementById('task-list');
            container.innerHTML = '<div class="loading-row">carregando...</div>';

            const { data, error } = await fetchTarefas();

            if (error) {
                container.innerHTML = `<div class="list-empty">Erro: ${error.message}</div>`;
                return;
            }

            renderList(data || []);
        }

        function renderList(tasks) {
            const container = document.getElementById('task-list');

            if (!tasks.length) {
                container.innerHTML = '<div class="list-empty">nenhuma tarefa ainda.</div>';
                return;
            }

            // ordena pelo score (maior primeiro)
            tasks.sort((a, b) => calcularScore(b) - calcularScore(a));

            const now = new Date();
            let html = '<div class="section-label">por importância</div>';

            tasks.forEach(t => {
                const score = calcularScore(t);
                const importancia = scoreParaLabel(score);

                let dotClass = '';
                if (t.prazo) {
                    const diff = new Date(t.prazo) - now;
                    if (diff < 0)             dotClass = 'overdue';
                    else if (diff < 86400000) dotClass = 'soon';
                }

                html += `
                    <div class="list-item" id="item-${t.id}">
                        <div class="li-dot ${dotClass}"></div>
                        <div class="li-body">
                            <div class="li-title">${t.titulo}</div>
                            ${t.descricao ? `<div class="li-desc">${t.descricao}</div>` : ''}
                            <div class="li-meta">
                                <span>status: ${t.status || '-'}</span>
                                <span>prioridade: ${t.prioridade || '-'}</span>
                                <span>importância: ${importancia} (${score}pts)</span>
                                ${t.prazo ? `<span>prazo: ${formatDate(t.prazo)}</span>` : ''}
                            </div>
                        </div>
                        <button class="li-del" onclick="removeTask('${t.id}')" title="remover">✕</button>
                    </div>`;
            });

            container.innerHTML = html;
        }

        // ── REMOVER TAREFA ───────────────────────────────────────────────

        async function removeTask(id) {
            const el = document.getElementById('item-' + id);
            if (el) el.style.opacity = '0.4';

            const { error } = await deleteTarefa(id);

            if (error) {
                if (el) el.style.opacity = '1';
                alert('Erro ao remover: ' + error.message);
            } else {
                if (el) el.remove();
            }
        }

        // ── INICIALIZAÇÃO ────────────────────────────────────────────────

        loadList();

    </script>
</body>
</html>
