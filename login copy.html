<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    :root {
      --bg-gradient-start: #4facfe;
      --bg-gradient-end: #00f2fe;

      --color-white: #ffffff;
      --color-border: #cccccc;

      --color-primary: #4facfe;
      --color-primary-hover: #3a8ee6;

      --shadow-color: rgba(0,0,0,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
    }

    .login-container {
      background: var(--color-white);
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 25px var(--shadow-color);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      outline: none;
      transition: 0.2s;
    }

    .input-group input:focus {
      border-color: var(--color-primary);
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--color-primary);
      color: var(--color-white);
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: var(--color-primary-hover);
    }

    .extra {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
    }

    .extra a {
      color: var(--color-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <form onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha" required>
      </div>

      <button type="submit" class="login-btn">Entrar</button>

      <div class="extra">
        <p>Não tem conta? <a href="#">Cadastrar</a></p>
      </div>
    </form>
  </div>

  <script src="scripts/supabase_conecction.js"></script>
    <script src="scripts/login.js"></script>

</body>
</html>
